<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMedia Visual CMS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="admin-panel">
        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="logo">🔧 CMedia CMS</span>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-label">PODSTRONY</div>
                <button onclick="loadPage('/')" class="nav-link active">🏠 Strona Główna</button>
                <button onclick="loadPage('/o-nas')" class="nav-link">ℹ️ O nas</button>
                
                <div class="nav-label">USTAWIENIA</div>
                <button onclick="showGlobal()" class="nav-link">🌐 Globalne (Tel/Email)</button>
            </nav>
            <div class="sidebar-footer">
                <button onclick="saveAll()" class="btn-save">💾 ZAPISZ WSZYSTKO</button>
                <button onclick="location.reload()" class="btn-logout">🚪 Wyloguj</button>
            </div>
        </aside>

        <main class="editor-area">
            <header class="top-bar">
                <span id="page-status">Gotowy do edycji</span>
            </header>
            <iframe id="site-preview" src="/?cms-edit=1"></iframe>
        </main>
    </div>

    <script>
        // Pamięć podręczna na zmiany
let pendingChanges = {}; 

// Słuchamy sygnałów z Twojej strony (z Iframe)
window.addEventListener('message', function(e) {
    if (e.data.type === 'cms-text-change') {
        // Zapisujemy: np. "index.heroTitle" -> "Nowa Treść"
        // Jeśli zmiana dotyczy globalnych, klucz to np. "phone"
        const storageKey = e.data.scope === 'global' ? `global.${e.data.key}` : e.data.key;
        pendingChanges[storageKey] = e.data.value;
        
        // Aktualizacja statusu w barze
        const status = document.getElementById('page-status');
        const count = Object.keys(pendingChanges).length;
        status.innerText = `⚠️ Niezapisane zmiany: ${count}`;
        status.style.color = "#f97316";
    }
});

async function saveAll() {
    if (Object.keys(pendingChanges).length === 0) {
        alert("Brak zmian do zapisania!");
        return;
    }

    const btn = document.querySelector('.btn-save');
    const originalText = btn.innerText;
    btn.innerText = "⏳ Wysyłanie...";
    btn.disabled = true;

    try {
        const response = await fetch('/cm-panel/api/save-visual.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                username: 'seba', // Twój login
                password: 'TWOJE_HASLO', // Wpisz swoje hasło
                changes: pendingChanges 
            })
        });
        
        const result = await response.json();

        if (result.success) {
            alert("✅ Zmiany wysłane do GitHuba! Strona odświeży się za ok. 60s.");
            pendingChanges = {}; // Czyścimy listę zmian
            document.getElementById('page-status').innerText = "✅ Zapisano pomyślnie";
            document.getElementById('page-status').style.color = "#22c55e";
        } else {
            alert("❌ Błąd: " + result.error);
        }
    } catch (e) {
        alert("❌ Błąd połączenia z serwerem.");
    } finally {
        btn.innerText = originalText;
        btn.disabled = false;
    }
}
    </script>
</body>
</html>

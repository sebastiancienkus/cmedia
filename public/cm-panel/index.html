<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMedia Visual CMS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="admin-panel">
        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="logo">🔧 CMedia CMS</span>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-label">PODSTRONY</div>
                <button onclick="loadPage('/')" class="nav-link active">🏠 Strona Główna</button>
                <button onclick="loadPage('/o-nas')" class="nav-link">ℹ️ O nas</button>
                
                <div class="nav-label">USTAWIENIA</div>
                <button onclick="showGlobal()" class="nav-link">🌐 Globalne (Tel/Email)</button>
            </nav>
            <div class="sidebar-footer">
                <button onclick="saveAll()" class="btn-save">💾 ZAPISZ WSZYSTKO</button>
                <button onclick="location.reload()" class="btn-logout">🚪 Wyloguj</button>
            </div>
        </aside>

        <main class="editor-area">
            <header class="top-bar">
                <span id="page-status">Gotowy do edycji</span>
            </header>
            <iframe id="site-preview" src="/?cms-edit=1"></iframe>
        </main>
    </div>

    <script>
        // Funkcja zmieniająca stronę w podglądzie
       let pendingChanges = {}; // Tu zbieramy Twoje zmiany "w locie"

// Odbieranie zmian ze strony (z iframe)
window.addEventListener('message', function(e) {
    if (e.data.type === 'cms-text-change') {
        // Zapisujemy zmianę: np. "index.heroTitle" -> "Nowy tekst"
        pendingChanges[e.data.key] = e.data.value;
        
        const status = document.getElementById('page-status');
        status.innerText = `⚠️ Niezapisane zmiany (${Object.keys(pendingChanges).length})`;
        status.style.color = "#f97316";
    }
});

async function saveAll() {
    if (Object.keys(pendingChanges).length === 0) {
        alert("Brak zmian do zapisania!");
        return;
    }

    const btn = document.querySelector('.btn-save');
    btn.innerText = "⏳ Zapisywanie na GitHub...";
    btn.disabled = true;

    try {
        const response = await fetch('/cm-panel/api/save-visual.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                // Używamy Twoich danych logowania (na sztywno lub z sesji)
                username: 'seba', 
                password: 'TWOJE_HASLO', 
                changes: pendingChanges 
            })
        });
        const result = await response.json();

        if (result.success) {
            alert("✅ Zapisano pomyślnie! GitHub buduje stronę (ok. 60s).");
            pendingChanges = {}; // Czyścimy pamięć
            const status = document.getElementById('page-status');
            status.innerText = "✅ Wszystko zapisane";
            status.style.color = "#22c55e";
        } else {
            alert("❌ Błąd: " + result.error);
        }
    } catch (e) {
        alert("❌ Błąd połączenia z serwerem.");
    } finally {
        btn.innerText = "💾 ZAPISZ WSZYSTKO";
        btn.disabled = false;
    }
}
    </script>
</body>
</html>

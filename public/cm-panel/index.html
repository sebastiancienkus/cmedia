<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMedia Visual CMS</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-overlay { position: fixed; inset: 0; background: #0f172a; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-card { background: #1e293b; padding: 40px; border-radius: 12px; width: 100%; max-width: 320px; text-align: center; }
        .login-card input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .hidden { display: none !important; }
        /* Dodatkowy styl dla statusu */
        #page-status { font-weight: bold; transition: color 0.3s; }
    </style>
</head>
<body>
    <div id="login-screen" class="login-overlay">
        <div class="login-card">
            <h2>🔐 Panel CMS</h2>
            <input type="text" id="user" placeholder="Login">
            <input type="password" id="pass" placeholder="Hasło">
            <button onclick="login()" class="btn-save" style="margin-top: 10px;">Zaloguj się</button>
        </div>
    </div>

    <div id="cms-main" class="admin-panel hidden">
        <aside class="sidebar">
            <div class="sidebar-header"><span class="logo">🔧 CMedia CMS</span></div>
            <nav class="sidebar-nav">
                <div class="nav-label">PODSTRONY</div>
                <button onclick="loadPage('/')" class="nav-link active" id="btn-home">🏠 Strona Główna</button>
                <div class="nav-label">USTAWIENIA</div>
                <button class="nav-link" style="opacity: 0.5; cursor: default;">🌐 Globalne (Wkrótce)</button>
            </nav>
            <div class="sidebar-footer">
                <button onclick="saveAll()" class="btn-save">💾 ZAPISZ WSZYSTKO</button>
                <button onclick="logout()" class="btn-logout">🚪 Wyloguj</button>
            </div>
        </aside>

        <main class="editor-area">
            <header class="top-bar">
                <span id="page-status">✅ Połączono</span>
            </header>
            <iframe id="site-preview"></iframe>
        </main>
    </div>

    <script>
        let pendingChanges = {};
        let currentPath = '/';

        function checkAuth() {
            if (localStorage.getItem('cms_logged') === 'true') {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('cms-main').classList.remove('hidden');
                loadPage('/'); // Pierwsze ładowanie
            }
        }

        function login() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if (u === 'seba' && p === '727911300') {
                localStorage.setItem('cms_logged', 'true');
                localStorage.setItem('cms_pass', p);
                location.reload();
            } else { alert("Błędne dane!"); }
        }

        function logout() {
            localStorage.removeItem('cms_logged');
            localStorage.removeItem('cms_pass');
            location.reload();
        }

        // --- KLUCZOWA FUNKCJA: Ładowanie z Cache Busterem ---
        function loadPage(path) {
            currentPath = path;
            const iframe = document.getElementById('site-preview');
            // Dodajemy znacznik czasu (?v=...), aby przeglądarka pobrała nową wersję
            const cacheBuster = "&v=" + Date.now();
            iframe.src = path + "?cms-edit=1" + cacheBuster;

            // UI: Aktywny link
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            if (path === '/') document.getElementById('btn-home').classList.add('active');
        }

        window.addEventListener('message', function(e) {
            if (e.data.type === 'cms-text-change') {
                const key = e.data.scope === 'global' ? `global.${e.data.key}` : e.data.key;
                pendingChanges[key] = e.data.value;
                document.getElementById('page-status').innerText = `⚠️ Niezapisane zmiany: ${Object.keys(pendingChanges).length}`;
                document.getElementById('page-status').style.color = "#f97316";
            }
        });

        async function saveAll() {
            if (Object.keys(pendingChanges).length === 0) return alert("Brak zmian!");
            
            const btn = document.querySelector('.btn-save');
            const status = document.getElementById('page-status');
            btn.innerText = "⏳ Wysyłanie...";
            btn.disabled = true;
            
            try {
                const res = await fetch('/cm-panel/api/save-visual.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: 'seba',
                        password: localStorage.getItem('cms_pass'),
                        changes: pendingChanges
                    })
                });
                const result = await res.json();
                
                if (result.success) {
                    pendingChanges = {};
                    
                    // Pokazujemy odliczanie zamiast przeładowywać cały panel
                    let timeLeft = 60;
                    const timer = setInterval(() => {
                        status.innerText = `⏳ Budowanie strony: ${timeLeft}s...`;
                        status.style.color = "#3b82f6";
                        timeLeft--;
                        if (timeLeft < 0) {
                            clearInterval(timer);
                            status.innerText = "✅ Gotowe! Odświeżam podgląd...";
                            status.style.color = "#22c55e";
                            btn.innerText = "💾 ZAPISZ WSZYSTKO";
                            btn.disabled = false;
                            loadPage(currentPath); // Odświeżamy tylko ramkę z nowym v=...
                        }
                    }, 1000);

                    alert("✅ Wysłano! GitHub potrzebuje ok. 60s na przebudowanie strony. Zobaczysz zmiany po odliczeniu.");
                } else { 
                    alert("❌ " + result.error); 
                    btn.innerText = "💾 ZAPISZ WSZYSTKO";
                    btn.disabled = false;
                }
            } catch (e) { 
                alert("Błąd połączenia."); 
                btn.innerText = "💾 ZAPISZ WSZYSTKO";
                btn.disabled = false;
            }
        }

        checkAuth();
    </script>
</body>
</html>

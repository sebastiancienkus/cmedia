<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMedia Visual CMS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="admin-panel">
        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="logo">🔧 CMedia CMS</span>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-label">PODSTRONY</div>
                <button onclick="loadPage('/')" class="nav-link active">🏠 Strona Główna</button>
                <button onclick="loadPage('/o-nas')" class="nav-link">ℹ️ O nas</button>
                
                <div class="nav-label">USTAWIENIA</div>
                <button onclick="showGlobal()" class="nav-link">🌐 Globalne (Tel/Email)</button>
            </nav>
            <div class="sidebar-footer">
                <button onclick="saveAll()" class="btn-save">💾 ZAPISZ WSZYSTKO</button>
                <button onclick="location.reload()" class="btn-logout">🚪 Wyloguj</button>
            </div>
        </aside>

        <main class="editor-area">
            <header class="top-bar">
                <span id="page-status">Gotowy do edycji</span>
            </header>
            <iframe id="site-preview" src="/?cms-edit=1"></iframe>
        </main>
    </div>

    <script>
        // Funkcja zmieniająca stronę w podglądzie
        function loadPage(path) {
            const iframe = document.getElementById('site-preview');
            iframe.src = path + "?cms-edit=1";
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            event.target.classList.add('active');
        }

        // Odbieranie zmian ze strony (z iframe)
        window.addEventListener('message', function(e) {
            if (e.data.type === 'cms-text-change') {
                console.log("Zmiana w locie:", e.data);
                document.getElementById('page-status').innerText = "⚠️ Masz niezapisane zmiany";
                document.getElementById('page-status').style.color = "#f97316";
                // Tutaj będziemy zbierać zmiany do paczki przed wysłaniem do save.php
            }
        });

        async function saveAll() {
            // Tutaj wywołamy Twój save.php, żeby wysłał zmiany na GitHuba
            alert("Wysyłam zmiany do GitHuba... (tu podepniemy save.php)");
        }
    </script>
</body>
</html>

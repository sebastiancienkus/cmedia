<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMedia Visual CMS | Professional Style Guide</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-overlay { position: fixed; inset: 0; background: #0f172a; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-card { background: #1e293b; padding: 40px; border-radius: 12px; width: 100%; max-width: 320px; text-align: center; }
        .login-card input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .hidden { display: none !important; }
        #page-status { font-weight: bold; transition: all 0.3s ease; font-size: 13px; }
        .live-link { display: block; margin-top: 10px; font-size: 12px; color: #3b82f6; text-decoration: none; border: 1px solid #3b82f6; padding: 8px; border-radius: 6px; text-align: center; transition: 0.2s; }
        .live-link:hover { background: rgba(59, 130, 246, 0.1); }

        /* --- STYL DLA STYLE GUIDE --- */
        .style-guide-box { padding: 12px; background: #111827; border-radius: 10px; margin: 10px; border: 1px solid #1f2937; }
        .style-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .style-row span { font-size: 11px; color: #9ca3af; }
        .style-section-label { font-size: 10px; color: #4b5563; font-weight: bold; margin: 12px 0 6px 4px; text-transform: uppercase; }
        
        input[type="color"] {
            appearance: none; -webkit-appearance: none; border: none; width: 24px; height: 24px; 
            cursor: pointer; background: none; padding: 0;
        }
        input[type="color"]::-webkit-color-swatch { border-radius: 50%; border: 2px solid #374151; }
    </style>
</head>
<body>
    <div id="login-screen" class="login-overlay">
        <div class="login-card">
            <h2>🔐 Panel CMS</h2>
            <input type="text" id="user" placeholder="Login">
            <input type="password" id="pass" placeholder="Hasło">
            <button onclick="login()" class="btn-save" style="margin-top: 10px; width: 100%;">Zaloguj się</button>
        </div>
    </div>

    <div id="cms-main" class="admin-panel hidden">
        <aside class="sidebar">
            <div class="sidebar-header"><span class="logo">🔧 CMedia CMS</span></div>
            
            <nav class="sidebar-nav">
                <div class="nav-label">STRONY</div>
                <button onclick="loadPage('/')" class="nav-link active" id="btn-home">🏠 Strona Główna</button>
                <a href="/" target="_blank" class="live-link">👁️ Zobacz Live</a>

                <div class="nav-label">🎨 STYLE GUIDE</div>
                <div class="style-guide-box">
                    <div class="style-section-label">Główne</div>
                    <div class="style-row"><span>Marka</span><input type="color" oninput="updateTheme('brand', this.value)" id="cp-brand"></div>
                    <div class="style-row"><span>Linki</span><input type="color" oninput="updateTheme('link', this.value)" id="cp-link"></div>
                    
                    <div class="style-section-label">Tła i Ramki</div>
                    <div class="style-row"><span>Tło witryny</span><input type="color" oninput="updateTheme('site-bg', this.value)" id="cp-site-bg"></div>
                    <div class="style-row"><span>Tło treści</span><input type="color" oninput="updateTheme('content-bg', this.value)" id="cp-content-bg"></div>
                    <div class="style-row"><span>Obramowanie</span><input type="color" oninput="updateTheme('border', this.value)" id="cp-border"></div>

                    <div class="style-section-label">Tekst</div>
                    <div class="style-row"><span>Nagłówki</span><input type="color" oninput="updateTheme('heading', this.value)" id="cp-heading"></div>
                    <div class="style-row"><span>Główny tekst</span><input type="color" oninput="updateTheme('text', this.value)" id="cp-text"></div>
                </div>
            </nav>

            <div class="sidebar-footer">
                <button onclick="saveAll()" class="btn-save">💾 ZAPISZ WSZYSTKO</button>
                <button onclick="logout()" class="btn-logout">🚪 Wyloguj</button>
            </div>
        </aside>

        <main class="editor-area">
            <header class="top-bar">
                <span id="page-status">✅ System gotowy</span>
            </header>
            <iframe id="site-preview"></iframe>
        </main>
    </div>

    <script>
        let pendingChanges = {};
        let currentPath = '/';

        // --- 🎨 FUNKCJA STYLE GUIDE ---
        function updateTheme(type, value) {
            // Mapa łącząca nazwy suwaków z kluczami w Twoim JSONie
            const jsonKeyMap = {
                'brand': 'brand',
                'link': 'link',
                'site-bg': 'site_bg',
                'content-bg': 'content_bg',
                'border': 'border_color',
                'heading': 'heading',
                'text': 'text'
            };

            const jsonKey = jsonKeyMap[type];
            // Zapisujemy w pamięci zmian głęboko w global.theme.colors
            pendingChanges[`global.theme.colors.${jsonKey}`] = value;
            
            // ⚡ NATYCHMIASTOWY PODGLĄD W RAMCE (Zmieniamy zmienną CSS w Iframe)
            const iframe = document.getElementById('site-preview');
            if (iframe.contentWindow) {
                iframe.contentWindow.document.documentElement.style.setProperty(`--color-${type}`, value);
            }
            
            updateStatusText();
        }

        function updateStatusText() {
            const status = document.getElementById('page-status');
            const count = Object.keys(pendingChanges).length;
            status.innerText = `⚠️ Niezapisane zmiany: ${count}`;
            status.style.color = "#f97316";
        }

        // --- 🔒 AUTORYZACJA ---
        function login() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if (u === 'seba' && p === '727911300') {
                localStorage.setItem('cms_logged', 'true');
                localStorage.setItem('cms_pass', p);
                location.reload();
            } else { alert("Błędne dane!"); }
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        function checkAuth() {
            if (localStorage.getItem('cms_logged') === 'true') {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('cms-main').classList.remove('hidden');
                loadPage('/');
            }
        }

        // --- 📄 ŁADOWANIE PODSTRONY ---
        function loadPage(path) {
            currentPath = path;
            const iframe = document.getElementById('site-preview');
            iframe.src = path + "?cms-edit=1&v=" + Date.now();
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            if (path === '/') document.getElementById('btn-home').classList.add('active');
        }

        // --- 📩 ODBIERANIE ZMIAN TEKSTU Z RAMKI ---
        window.addEventListener('message', function(e) {
            if (e.data.type === 'cms-text-change') {
                const fullKey = e.data.scope === 'global' ? `global.${e.data.key}` : `index.${e.data.key}`;
                pendingChanges[fullKey] = e.data.value;
                updateStatusText();
            }
        });

            if (Object.keys(pendingChanges).length === 0) return alert("Brak zmian do zapisu!");

            btn.innerText = "⚡ Zapisywanie...";
            btn.disabled = true;

            try {

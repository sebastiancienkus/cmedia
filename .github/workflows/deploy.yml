name: 🚀 Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  build:
    name: 🏗️ Build & 🛰️ Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm' # TA LINIA DODAJE CACHE (MAGIA PRĘDKOŚCI)

      - name: 📦 Install dependencies
        run: npm ci # 'npm ci' jest szybsze niż 'npm install' w automatyzacji

      - name: 🏗️ Build Astro
        run: npm run build

      - name: 🔐 Wstrzyknij Token do PHP
        run: sed -i 's/SEKRETNY_TOKEN_Z_GITHUBA/${{ secrets.CMS_TOKEN }}/g' dist/cm-panel/api/save.php

      - name: 📂 Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ./
          protocol: ftp
          port: 21
          dangerous-clean-slate: false # Zmień na false, żeby nie kasował wszystkiego za każdym razem (przyspiesza FTP)
          dangerously-disable-concurrent-uploads: false # Pozwól na wysyłanie kilku plików naraz

name: 🚀 Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  build:
    name: 🏗️ Build & 🛰️ Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🏗️ Build Astro
        run: npm run build

      - name: 📂 Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          # Używamy ścieżki względnej, żeby nie tworzyć podfolderów
          server-dir: ./public_html/
          protocol: ftp
          port: 21
          # --- KLUCZ DO SUKCESU NA SEOHOST ---
          timeout: 90000
          # Wymuszamy przesyłanie po jednym pliku, żeby nie zrywało połączenia
          dangerously-disable-concurrent-uploads: true

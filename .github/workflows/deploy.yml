name: 🚀 Deploy Astro to Seohost

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Pobieranie kodu z GitHub
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js (Wersja 22 dla Astro v5)
        uses: actions/setup-node@v4
        with:
          node-version: '22' # To naprawi błąd "Node.js not supported"

      - name: 📦 Instalacja zależności
        run: npm install

      - name: 🏗️ Budowanie projektu (Generowanie HTML)
        run: npm run build

      - name: 📂 Wysyłka gotowych plików na Seohost
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/    # GitHub wysyła tylko gotowy HTML
          server-dir: ./public_html/
          dangerous-clean-slate: false

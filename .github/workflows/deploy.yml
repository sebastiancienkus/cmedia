name: 🚀 Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  build:
    name: 🏗️ Build & 🛰️ Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Zmienione na 22 dla Astro v5

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🏗️ Build Astro
        run: npm run build

      - name: 📂 Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          # Ustawiamy ścieżkę docelową dokładnie tak, jak miałeś wcześniej
          server-dir: ./public_html/
          # --- POPRAWKI DLA STABILNOŚCI (Twoje sprawdzone parametry) ---
          protocol: ftp
          port: 21
          timeout: 60000
          dangerously-disable-concurrent-uploads: true
          state-name: .ftp-deploy-sync-state.json
